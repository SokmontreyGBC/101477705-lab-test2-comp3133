<div *ngIf="loading" style="display:flex; justify-content:center; padding: 3rem">
  <mat-progress-spinner mode="indeterminate" color="accent"></mat-progress-spinner>
</div>

<div class="card-grid" *ngIf="!loading">
  <mat-card
    *ngFor="let character of characters"
    appearance="outlined"
    (click)="goToDetails(character.id)"
    style="cursor: pointer"
  >
    <mat-card-header>
      <mat-card-title>{{ character.name }}</mat-card-title>
      <mat-card-subtitle [style.color]="getHouseColor(character.house)">
        {{ character.house || 'Unknown' }}
      </mat-card-subtitle>
    </mat-card-header>
    <img mat-card-image [src]="character.image || 'assets/placeholder.png'" [alt]="character.name" />
  </mat-card>
</div>
