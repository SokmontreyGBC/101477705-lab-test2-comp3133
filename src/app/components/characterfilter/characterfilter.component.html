<div style="padding: 1.5rem 1.5rem 0; display: flex; justify-content: center">
  <mat-form-field appearance="fill" style="width: 300px">
    <mat-label>Filter by House</mat-label>
    <mat-select [(ngModel)]="selectedHouse" (selectionChange)="onHouseChange($event)">
      <mat-option value="">All Houses</mat-option>
      <mat-option value="gryffindor">Gryffindor</mat-option>
      <mat-option value="slytherin">Slytherin</mat-option>
      <mat-option value="hufflepuff">Hufflepuff</mat-option>
      <mat-option value="ravenclaw">Ravenclaw</mat-option>
    </mat-select>
  </mat-form-field>
</div>

<div *ngIf="loading" style="display:flex; justify-content:center; padding: 3rem">
  <mat-progress-spinner mode="indeterminate" color="accent"></mat-progress-spinner>
</div>

<div class="card-grid" *ngIf="!loading">
  <mat-card
    *ngFor="let character of characters"
    appearance="outlined"
    (click)="goToDetails(character.id)"
    style="cursor: pointer"
  >
    <mat-card-header>
      <mat-card-title>{{ character.name }}</mat-card-title>
      <mat-card-subtitle [style.color]="getHouseColor(character.house)">
        {{ character.house || 'Unknown' }}
      </mat-card-subtitle>
    </mat-card-header>
    <img mat-card-image [src]="character.image || 'assets/placeholder.png'" [alt]="character.name" />
  </mat-card>
</div>
